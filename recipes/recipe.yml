---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: silverblue-surface

description: A custom Fedora Silverblue based distro using the linux-surface kernel for Microsoft Surface devices

base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:
  - type: files
    files:
      - source: system
        destination: /

  # Add Linux Surface repository
  - type: script
    snippets:
      - |
        curl -fsSL https://pkg.surfacelinux.com/fedora/linux-surface.repo \
          -o /etc/yum.repos.d/linux-surface.repo

        # Surface Linux does not yet provide Fedora 44 packages
        # Use Fedora 43 kernel packages instead
        sed -i '/^baseurl=/ s/\$releasever/43/g' \
          /etc/yum.repos.d/linux-surface.repo

        rpm --import \
          https://raw.githubusercontent.com/linux-surface/linux-surface/master/pkg/keys/surface.asc

  - type: dnf
    remove:
      packages:
        # Replace Firefox RPM with Flatpak
        - firefox
        - firefox-langpacks

        # Remove GNOME Software - Bazaar will be the app store
        - gnome-software
        - gnome-software-rpm-ostree
        - gnome-software-flatpak

        # Remove Fedora kernel packages
        - kernel
        - kernel-core
        - kernel-modules
        - kernel-modules-core
        - kernel-modules-extra

    install:
      packages:
        # Linux Surface kernel
        - kernel-surface

        # Surface hardware support
        - iptsd

        # Better Intel thermal management
        - thermald

        # Secure Boot support
        - surface-secureboot

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        install:

          # Browser
          - org.mozilla.firefox

          # App store
          - io.github.kolunmi.Bazaar

          # Flatpak management
          - io.github.flattool.Warehouse
          - com.github.tchx84.Flatseal

          # GNOME extensions
          - com.mattjakeman.ExtensionManager

          # AppImage management
          - it.mijorus.gearlever

          # GNOME utilities
          - org.gnome.Evince
          - org.gnome.TextEditor
          - org.gnome.Loupe
          - org.gnome.FileRoller
          - org.gnome.Weather

      - scope: user
- type: systemd
  system:
    enabled:
      - NetworkManager-wait-online.service

  - type: signing
